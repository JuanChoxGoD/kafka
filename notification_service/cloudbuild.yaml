steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kafka/notification-service:$COMMIT_SHA'
      - './notification_service'

  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kafka/notification-service:$COMMIT_SHA'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: Deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'notification-service'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/kafka/notification-service:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--set-cloudsql-instances=project-e15b8e8c-0432-43ea-ac0:us-central1:db-comercial'

options:
  logging: CLOUD_LOGGING_ONLY
